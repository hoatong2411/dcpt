# general settings
name: NAFNet_AIO_5d_test
model_type: SRModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: MultiDegradationDataset
    degradation_types: [blur, haze, lowlight, rain, snow]
    dataroot_gt: 
      - ./data/dataset_train/Blur/GT
      - ./data/dataset_train/Haze/GT
      - ./data/dataset_train/Lowlight/GT
      - ./data/dataset_train/Rain/GT
      - ./data/dataset_train/Snow/GT
    dataroot_lq: 
      - ./data/dataset_train/Blur/LQ
      - ./data/dataset_train/Haze/LQ
      - ./data/dataset_train/Lowlight/LQ
      - ./data/dataset_train/Rain/LQ
      - ./data/dataset_train/Snow/LQ
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
    num_worker_per_gpu: 3
    batch_size_per_gpu: 6
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
    # 3600
  val_1:
    name: Blur_Val
    type: PairedImageDataset
    dataroot_gt: ./data/dataset_val/Blur/GT
    dataroot_lq: ./data/dataset_val/Blur/LQ
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
  val_2:
    name: Haze_Val
    type: PairedImageDataset
    dataroot_gt: ./data/dataset_val/Haze/GT
    dataroot_lq: ./data/dataset_val/Haze/LQ
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
  val_3:
    name: Lowlight_Val
    type: PairedImageDataset
    dataroot_gt: ./data/dataset_val/Lowlight/GT
    dataroot_lq: ./data/dataset_val/Lowlight/LQ
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
  val_4:
    name: Rain_Val
    type: PairedImageDataset
    dataroot_gt: ./data/dataset_val/Rain/GT
    dataroot_lq: ./data/dataset_val/Rain/LQ
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
  val_5:
    name: Snow_Val
    type: PairedImageDataset
    dataroot_gt: ./data/dataset_val/Snow/GT
    dataroot_lq: ./data/dataset_val/Snow/LQ
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1

dataloader:
  phase: train
  use_shuffle: true
  num_worker_per_gpu: 3
  batch_size_per_gpu: 6
  dataset_enlarge_ratio: 1
  prefetch_mode: ~
  pin_memory: true

# network structures
network_g:
  type: NAFNet
  width: 64
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]
  window_size: 8

network_dc:
  type: PromptIR_NoImg_DC
  feature_dims: [64, 128, 256, 512]
  num_classes: 5

find_unused_parameters: false

hook_names: decoder

path:
  pretrain_network_g: ~
  strict_load_g: false
  resume_state: ~

grad_clip: 0.01

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: 0
    betas: [0.9, 0.999]
  optim_dc:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [800000]
    restart_weights: [1]
    eta_min: !!float 1e-6

  total_iter: 800000  
  warmup_iter: 40000  

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  classify_opt:
    type: FocalLoss
    gamma: 2.0

# validation settings
val:
  val_freq: !!float 100
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
      image_range: 255.0
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
      image_range: 255.0

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 100
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
