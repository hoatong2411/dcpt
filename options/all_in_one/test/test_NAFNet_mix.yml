name: NAFNet_mix
suffix: ~  # add suffix to saved images
model_type: SRModel
scale: 1
crop_border: 0  # crop border when evaluation. If None, crop the scale pixels
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

# dataset and data loader settings
datasets:
  test_6:
    name: low_haze_rain
    type: PairedImageDataset
    dataroot_gt: /mnt/nasv3/hjk/MixedRestorationDataset/CDD/test/clear
    dataroot_lq: /mnt/nasv3/hjk/MixedRestorationDataset/CDD/test/low_haze_rain
    io_backend:
      type: disk
  test_7:
    name: low_haze_snow
    type: PairedImageDataset
    dataroot_gt: /mnt/nasv3/hjk/MixedRestorationDataset/CDD/test/clear
    dataroot_lq: /mnt/nasv3/hjk/MixedRestorationDataset/CDD/test/low_haze_snow
    io_backend:
      type: disk
  test_12:
    name: low_blur_noise
    type: PairedImageDataset
    dataroot_gt: /mnt/nasv3/hjk/MixedRestorationDataset/LoLBlur/test/high_sharp_scaled
    dataroot_lq: /mnt/nasv3/hjk/MixedRestorationDataset/LoLBlur/test/low_blur_noise
    io_backend:
      type: disk

# network structures
network_g:
  type: NAFNet
  width: 64
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]
  window_size: 16 

path:
  pretrain_network_g: pretrained_models/nafnet_dcpt_cdd.pth
  param_key_g: params_ema
  strict_load_g: true

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
      image_range: 1.0
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
      image_range: 1.0
