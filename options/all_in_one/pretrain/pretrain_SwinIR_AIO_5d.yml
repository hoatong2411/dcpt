# general settings
name: pretrain_SwinIR_all_in_one_derain_denoise_dehaze_lowlight_deblur
model_type: DCPTModel
scale: 1
num_gpu: auto  # set num_gpu: 0 for cpu mode
manual_seed: 0
classify: true

# dataset and data loader settings
datasets:
  train_1:
    name: Derain
    type: PairedImageDataset
    dataroot_gt: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/DerainDataset/train/Rain13K/target
    dataroot_lq: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/DerainDataset/train/Rain13K/input
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
  train_2:
    name: Denoise
    type: PairedImageDenoiseDataset
    dataroot_gt: /public/liguoqi/jkhu/DenoiseDataset/train_dfwb
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
    sigma_type: choice
    sigma_range: [15, 25, 50]
  train_3:
    name: Dehaze
    type: PairedImageDehazeDataset
    dataroot_gt: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/DehazeDataset/OTS_BETA/clear
    dataroot_lq: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/DehazeDataset/OTS_BETA/synthetic/overall
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
  train_4:
    name: LowLight
    type: PairedImageDataset
    dataroot_gt: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/LowLightDataset/LOL_syn/normal
    dataroot_lq: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/LowLightDataset/LOL_syn/low
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
    dataset_enlarge_ratio: 10
  train_5:
    name: Deblur
    type: PairedImageDataset
    dataroot_gt: /public/liguoqi/jkhu/MotionDeblur/GoPro/train/target_crops
    dataroot_lq: /public/liguoqi/jkhu/MotionDeblur/GoPro/train/input_crops
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true

  val_1:
    name: Rain100L
    type: PairedImageDataset
    dataroot_gt: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/DerainDataset/Derain/Rain100L/norain
    dataroot_lq: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/DerainDataset/Derain/Rain100L/rainy
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    center_crop: 256
  val_2:
    name: CBSD68
    type: PairedImageDenoiseDataset
    dataroot_gt: /public/liguoqi/jkhu/59_jkhu/jkhu/kernel-estimation/datasets/denoise/CBSD68
    io_backend:
      type: disk
    sigma_type: constant
    sigma_range: 25
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    center_crop: 256
  val_3:
    name: SOTS
    type: PairedImageDehazeDataset
    dataroot_gt: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/DehazeDataset/SOTS/outdoor/gt
    dataroot_lq: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/DehazeDataset/SOTS/outdoor/hazy
    io_backend:
      type: disk
    suffix: .png
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    center_crop: 256
  val_4:
    name: LowLight
    type: PairedImageDataset
    dataroot_gt: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/LowLightDataset/eval15/high
    dataroot_lq: /public/liguoqi/jkhu/59_jkhu/jkhu/all_in_one_dataset/LowLightDataset/eval15/low
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    center_crop: 256
  val_5:
    name: Gopro
    type: PairedImageDataset
    dataroot_gt: /public/liguoqi/jkhu/MotionDeblur/test_sub/target/
    dataroot_lq: /public/liguoqi/jkhu/MotionDeblur/test_sub/input/
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    center_crop: 256

dataloader:
  phase: train
  use_shuffle: true
  num_worker_per_gpu: 1
  batch_size_per_gpu: 4
  dataset_enlarge_ratio: 1
  prefetch_mode: ~
  pin_memory: true

dataloader_val:
  phase: val
  use_shuffle: false
  num_worker_per_gpu: 1
  batch_size_per_gpu: 1
  dataset_enlarge_ratio: 1
  prefetch_mode: ~
  pin_memory: true

# network structures
network_g:
  type: SwinIR
  embed_dim: 180
  depths: [6, 6, 6, 6, 6, 6]
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2.0
  window_size: 8
  upscale: 1

find_unused_parameters: false

hook_names: decode_layers

network_dc:
  type: PromptIR_NoImg_DC
  feature_dims: [180, 180, 180]
  num_classes: 5
  downsample: true

path:
  pretrain_network_g: dcpt_swinir_pretrain_5d.pth
  strict_load_g: false
  pretrain_network_dc: dcpt_swinir_pretrain_5d_dc.pth
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.999]
  optim_dc:
    type: AdamW
    lr: !!float 5e-5
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [1000000]
    restart_weights: [1]
    eta_min: !!float 1e-6

  total_iter: 1000000  # 1000 epoch 1 nnproc
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  classify_opt:
    type: FocalLoss
    gamma: 2.0

# validation settings
val:
  val_freq: !!float 2e4
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: true
      image_range: 255.0
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: true
      image_range: 255.0

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2e4
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
