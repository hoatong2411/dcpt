# general settings
name: pretrain_NAFNet_all_in_one_10D
model_type: DCPTModel
scale: 1
num_gpu: auto  # set num_gpu: 0 for cpu mode
manual_seed: 0
classify: true

# dataset and data loader settings
datasets:
