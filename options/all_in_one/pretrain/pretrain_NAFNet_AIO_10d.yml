    name: Denoise
    type: PairedImageDenoiseDataset
    dataroot_gt: /mnt/nasv3/hjk/DenoiseDataset/train/DFWB
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
    sigma_type: random
    sigma_range: [1, 50]
  # 69635
  train_2:
    name: MotionDeblur
    type: PairedImageDataset
    dataroot_gt: /mnt/nasv3/hjk/DeblurDataset/GoPro/train/target_crops
    dataroot_lq: /mnt/nasv3/hjk/DeblurDataset/GoPro/train/input_crops
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: true
    use_rot: true
    dataset_enlarge_ratio: 4
  # 16824 * 4
  train_3:
    name: DefocusDeblur
    type: PairedImageDataset
    dataroot_gt: /mnt/nasv3/hjk/DefocusDeblurDataset/train_crop/target_crops
    dataroot_lq: /mnt/nasv3/hjk/DefocusDeblurDataset/train_crop/inputC_crops
    io_backend:
