    # 15
  val_10:
    name: Inpainting
    type: PairedImageInpaintingDataset
    dataroot_gt: datasets/denoise/test/CBSD68
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    center_crop: 256
    # 68

dataloader:
  phase: train
  use_shuffle: true
  num_worker_per_gpu: 4
  batch_size_per_gpu: 8
  dataset_enlarge_ratio: 1
  prefetch_mode: ~
  pin_memory: true

dataloader_val:
  phase: val
  use_shuffle: false
  num_worker_per_gpu: 4
  batch_size_per_gpu: 8
  dataset_enlarge_ratio: 1
  prefetch_mode: ~
  pin_memory: true

# network structures
network_g:
  type: NAFNet
  width: 64
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]
  window_size: 16

find_unused_parameters: false

hook_names: decoder

network_dc:
  type: PromptIR_NoImg_DC
  feature_dims: [64, 128, 256, 512]
  num_classes: 10

path:
  pretrain_network_g: ~
  strict_load_g: false
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: 0
    betas: [0.9, 0.999]
  optim_dc:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [1000000]
    restart_weights: [1]
    eta_min: !!float 1e-6

  total_iter: 1000000  # 1000 epoch 1 nnproc
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  classify_opt:
    type: FocalLoss
    gamma: 2.0

# validation settings
val:
  val_freq: !!float 2e4
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: true
      image_range: 255.0
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: true
      image_range: 255.0

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2e4
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
